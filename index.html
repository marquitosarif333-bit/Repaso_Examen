<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Repaso - Inventario</title>
<style>
body { font-family: sans-serif; padding: 20px; }

.container { max-width: 400px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; }

input { display: block; margin-bottom: 10px; width: 90%; padding: 8px; }
button { background-color: #2ecc71; color: white; border: none; padding: 10px;
cursor: pointer; }
</style>
</head>
<body>
<div class="container">
<h3>Agregar al Inventario</h3>
<input type="text" id="nombre" placeholder="Nombre del producto">
<input type="number" id="precio" placeholder="Precio">
<input type="number" id="cantidad" placeholder="Cantidad">
<button id="btnAgregar">Agregar Producto</button>
<hr>
<p>Total Inversión: $<span id="totalDisplay">0</span></p>
</div>
<script src="js/inventario.js"></script>
</body>
</html>
